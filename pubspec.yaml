name: coffeeno
description: "A modern coffee discovery, scanning, and tasting journal app."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # Firebase
  firebase_core: ^3.12.0
  firebase_auth: ^5.5.0
  cloud_firestore: ^5.6.0
  firebase_storage: ^12.4.0
  google_sign_in: ^6.2.0

  # State management
  flutter_riverpod: ^2.6.0
  riverpod_annotation: ^2.6.0

  # Routing
  go_router: ^15.1.0

  # Camera & scanning
  camera: ^0.11.0
  google_mlkit_text_recognition: ^0.14.0

  # AI
  google_generative_ai: ^0.4.0

  # UI
  cupertino_icons: ^1.0.8
  flutter_svg: ^2.0.0
  cached_network_image: ^3.4.0
  shimmer: ^3.0.0
  flutter_animate: ^4.5.0

  # Map
  flutter_map: ^7.0.0
  latlong2: ^0.9.0

  # Subscription
  purchases_flutter: ^8.0.0

  # Utils
  intl: ^0.20.2
  uuid: ^4.5.0
  image_picker: ^1.1.0
  timeago: ^3.7.0
  url_launcher: ^6.3.0
  path_provider: ^2.1.0
  share_plus: ^10.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  riverpod_generator: ^2.6.0
  build_runner: ^2.4.0
  mockito: ^5.4.0

flutter:
  uses-material-design: true
  generate: true

  assets:
    - assets/images/
    - assets/l10n/

  fonts:
    - family: PlusJakartaSans
      fonts:
        - asset: assets/fonts/PlusJakartaSans-Regular.ttf
          weight: 400
        - asset: assets/fonts/PlusJakartaSans-Medium.ttf
          weight: 500
        - asset: assets/fonts/PlusJakartaSans-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/PlusJakartaSans-Bold.ttf
          weight: 700
