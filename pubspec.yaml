name: coffeeno
description: "A modern coffee discovery, scanning, and tasting journal app."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # Firebase
  firebase_core: ^4.7.0
  firebase_auth: ^6.4.0
  cloud_firestore: ^6.3.0
  firebase_storage: ^13.3.0
  google_sign_in: ^7.2.0

  # State management
  flutter_riverpod: ^3.3.1
  riverpod_annotation: ^4.0.2

  # Routing
  go_router: ^17.2.2

  # Camera & scanning
  camera: ^0.12.0+1
  google_mlkit_text_recognition: ^0.15.1

  # AI
  google_generative_ai: ^0.4.0

  # UI
  cupertino_icons: ^1.0.8
  flutter_svg: ^2.0.0
  cached_network_image: ^3.4.0
  shimmer: ^3.0.0
  flutter_animate: ^4.5.0

  # Map
  flutter_map: ^8.3.0
  latlong2: ^0.9.0

  # Notifications
  flutter_local_notifications: ^18.0.1
  timezone: ^0.10.0

  # Utils
  intl: ^0.20.2
  uuid: ^4.5.0
  image_picker: ^1.1.0
  timeago: ^3.7.0
  url_launcher: ^6.3.0
  path_provider: ^2.1.0
  share_plus: ^10.1.4
  purchases_flutter: ^10.0.1
  purchases_ui_flutter: ^10.0.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  riverpod_generator: ^4.0.3
  build_runner: ^2.4.0
  mockito: ^5.4.0

flutter:
  uses-material-design: true
  generate: true

  assets:
    - assets/images/
    - assets/l10n/

  fonts:
    - family: PlusJakartaSans
      fonts:
        - asset: assets/fonts/PlusJakartaSans-Regular.ttf
          weight: 400
        - asset: assets/fonts/PlusJakartaSans-Medium.ttf
          weight: 500
        - asset: assets/fonts/PlusJakartaSans-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/PlusJakartaSans-Bold.ttf
          weight: 700
